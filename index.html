<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator Assistant Stable</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:#fff}
.login,.app{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
input,button{padding:12px;margin:5px;border-radius:8px;border:none}
button{background:#00ffc3}
.hidden{display:none}
.card{background:#111827;padding:15px;margin:10px;border-radius:10px;width:90%}
.green{color:#00ff99;font-weight:bold}
.red{color:#ff4d4d;font-weight:bold}
.yellow{color:#ffd966}
</style>

</head>
<body>

<div class="login" id="login">
<h2>🔐 AVIATOR STABLE</h2>
<input id="user" placeholder="Nom">
<input id="pass" type="password" placeholder="Mot de passe">
<button onclick="login()">Entrer</button>
</div>

<div class="app hidden" id="app">

<h2>📊 MODE LIVE RAPIDE</h2>

<div class="card">
<h3>Historique</h3>
<div id="history">Aucune donnée</div>
</div>

<div class="card">
<h3>Décision IA</h3>
<div id="decision">En attente...</div>
</div>

<div class="card">
<h3>💰 Score</h3>
Gains: <span id="gain">0</span> | Pertes: <span id="loss">0</span>
</div>

<div class="card">
<h3>⚡ Entrée rapide</h3>
<input id="val" placeholder="ex: 2.5" onkeydown="if(event.key==='Enter') add()">
<button onclick="add()">Ajouter</button><br>

<button onclick="quick(1.2)">1.2</button>
<button onclick="quick(1.5)">1.5</button>
<button onclick="quick(2)">2</button>
<button onclick="quick(3)">3</button>
<button onclick="quick(5)">5</button>
</div>

<div class="card">
<button onclick="openAviator()">🎯 Ouvrir Aviator</button>
</div>

</div>

<script>
const USER="Jonathan";
const PASS="1999";

let data=[];
let gain=0;
let loss=0;

function login(){
if(user.value===USER && pass.value===PASS){
document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
}
}

function add(){
let v=parseFloat(val.value);
if(!v) return;

process(v);
val.value="";
}

function quick(v){
process(v);
}

function process(v){

data.push(v);
if(data.length>10) data.shift();

analyse();
update();
}

function analyse(){

let last5=data.slice(-5);

let low=last5.filter(x=>x<2).length;
let mid=last5.filter(x=>x>=2 && x<=5).length;
let high=last5.filter(x=>x>5).length;

let msg="";

// IA améliorée
if(low>=3 && high===0){
msg='<span class="green">🟢 JOUER (viser 2x)</span>';
gain++;
}
else if(high>=2){
msg='<span class="red">🔴 STOP (risque élevé)</span>';
loss++;
}
else if(mid>=3){
msg='<span class="yellow">🟡 PETITE MISE</span>';
}
else{
msg='⚪ ATTENDRE';
}

document.getElementById("decision").innerHTML=msg;
}

function update(){
document.getElementById("history").innerHTML=data.map(x=>x+"x").join(" | ");
document.getElementById("gain").innerText=gain;
document.getElementById("loss").innerText=loss;
}

function openAviator(){
window.open("https://www.betpawa.com","_blank");
}

// refs
let val=document.getElementById("val");
let user=document.getElementById("user");
let pass=document.getElementById("pass");
</script>

</body>
</html>
