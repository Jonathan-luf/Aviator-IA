<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Aviator Pro Safe IA</title>

<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:15px;
}
.card {
    background:#1e293b;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}
button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
}
input {
    padding:10px;
    width:100px;
}
</style>
</head>

<body>

<h2>🔥 AVIATOR SAFE IA</h2>

<div class="card">
<h3>Historique</h3>
<p id="history"></p>
</div>

<div class="card">
<h3>🎯 Décision</h3>
<p id="decision">Analyse...</p>
</div>

<div class="card">
<h3>💰 Cashout conseillé</h3>
<p id="cashout">--</p>
</div>

<div class="card">
<h3>⚡ Ajouter résultat</h3>
<input id="input" placeholder="ex: 1.5">
<button onclick="add()">Ajouter</button>
</div>

<script>

let history = [];

function add(){
    let val = parseFloat(document.getElementById("input").value);
    if(!val) return;

    history.unshift(val);
    if(history.length > 10) history.pop();

    update();
}

function update(){

    document.getElementById("history").innerText = history.join("x | ") + "x";

    let last = history.slice(0,5);

    let low = last.filter(x => x < 2).length;
    let high = last.filter(x => x >= 3).length;

    let decision = "";
    let cashout = "";

    if(low >= 4){
        decision = "🛑 STOP (risque élevé)";
        cashout = "Ne joue pas";
    }
    else if(high >= 2){
        decision = "🚀 Opportunité";
        cashout = "Cashout à 2.5x max";
    }
    else{
        decision = "💰 Jeu SAFE";
        cashout = "Cashout à 1.8x";
    }

    document.getElementById("decision").innerText = decision;
    document.getElementById("cashout").innerText = cashout;
}

</script>

</body>
</html>
