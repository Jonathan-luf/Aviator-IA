<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator Expert</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:#fff}
.login,.app{display:flex;flex-direction:column;align-items:center;justify-content:center}
input,button{padding:12px;margin:5px;border-radius:8px;border:none}
button{background:#00ffc3}
.hidden{display:none}
.card{background:#111827;padding:15px;margin:10px;border-radius:10px;width:90%}
.green{color:#00ff99}
.red{color:#ff4d4d}
.yellow{color:#ffd966}
canvas{background:#fff;border-radius:10px}
</style>

</head>
<body>

<div class="login" id="login">
<h2>🔐 AVIATOR EXPERT</h2>
<input id="user" placeholder="Nom">
<input id="pass" type="password" placeholder="Mot de passe">
<button onclick="login()">Entrer</button>
</div>

<div class="app hidden" id="app">

<h2>📊 SESSION LIVE</h2>

<div class="card">
<h3>Historique</h3>
<div id="history"></div>
</div>

<div class="card">
<h3>Décision IA</h3>
<div id="decision"></div>
</div>

<div class="card">
<h3>💰 Score</h3>
Gains: <span id="gain">0</span> | Pertes: <span id="loss">0</span>
</div>

<div class="card">
<h3>📊 Graphique</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<input id="val" placeholder="ex: 2.5" onkeydown="if(event.key==='Enter') add()">
<button onclick="add()">Ajouter</button>
</div>

</div>

<script>
const USER="Jonathan";
const PASS="1999";

let data=[];
let gain=0;
let loss=0;
let historyScore=[];

let chart;

function login(){
if(user.value===USER && pass.value===PASS){
loginDiv.classList.add("hidden");
app.classList.remove("hidden");
initChart();
}
}

function initChart(){
let ctx=document.getElementById("chart");
chart=new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
label:'Performance',
data:[],
borderWidth:2
}]
},
options:{
responsive:true
}
});
}

function add(){
let v=parseFloat(val.value);
if(!v) return;

data.push(v);
if(data.length>10) data.shift();

analyse(v);
update();
val.value="";
}

function analyse(last){

let last5=data.slice(-5);

let low=last5.filter(x=>x<2).length;
let mid=last5.filter(x=>x>=2 && x<=5).length;
let high=last5.filter(x=>x>5).length;

let msg="";

// IA plus fine
if(low>=3 && high===0){
msg='<span class="green">🟢 ENTRÉE FORTE (2x-3x)</span>';
gain++;
}
else if(high>=2){
msg='<span class="red">🔴 STOP DANGER</span>';
loss++;
}
else if(mid>=3){
msg='<span class="yellow">🟡 STABLE → PETITE MISE</span>';
}
else{
msg='⚪ ATTENTE';
}

decision.innerHTML=msg;

// score graphique
let score = gain - loss;
historyScore.push(score);

chart.data.labels.push(historyScore.length);
chart.data.datasets[0].data.push(score);
chart.update();
}

function update(){
history.innerHTML=data.map(x=>x+"x").join(" | ");
gainEl.innerText=gain;
lossEl.innerText=loss;
}

// refs
let loginDiv=document.getElementById("login");
let app=document.getElementById("app");
let val=document.getElementById("val");
let history=document.getElementById("history");
let decision=document.getElementById("decision");
let gainEl=document.getElementById("gain");
let lossEl=document.getElementById("loss");
</script>

</body>
</html>
